<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр товара</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Интернет-магазин</h1>
            <nav>
                <a href="index.html">Каталог</a>
                <a href="cart.html">Корзина <span id="cart-count">0</span></a>
            </nav>
        </div>
    </header>

    <main>
        <section id="product" class="container">
            <div class="product-detail">
                <div class="product-image">
                    <img id="product-image" src="" alt="Товар">
                </div>
                <div class="product-info">
                    <h2 id="product-name">Название товара</h2>
                    <p class="product-price" id="product-price">0 руб</p>
                    <p id="product-description">Описание товара будет отображено здесь.</p>
                    <button class="btn" onclick="addToCartFromProduct()">В корзину</button>
                    <button class="btn btn-back" onclick="goBack()">Назад к каталогу</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Интернет-магазин. Все права защищены.</p>
        </div>
    </footer>

    <script src="src.js"></script>
    <script>
        // Получение ID товара из URL
        function getProductId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('id'));
        }

        // Загрузка информации о товаре
        function loadProduct() {
            const productId = getProductId();
            const product = products.find(p => p.id === productId);
            
            if (product) {
                document.getElementById('product-image').src = product.image;
                document.getElementById('product-image').alt = product.name;
                document.getElementById('product-name').textContent = product.name;
                document.getElementById('product-price').textContent = product.price + ' руб';
                document.getElementById('product-description').textContent = `Описание ${product.name}. Это высококачественный товар по отличной цене.`;
            } else {
                document.querySelector('.product-detail').innerHTML = '<p>Товар не найден</p>';
            }
        }

        // Добавление товара в корзину со страницы товара
        function addToCartFromProduct() {
            const productId = getProductId();
            addToCart(productId);
        }

        // Возврат к каталогу
        function goBack() {
            window.history.back();
        }

        // Инициализация страницы
        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            updateCartCount();
        });
    </script>
</body>
</html>

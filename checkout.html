<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Интернет магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Интернет магазин</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="index.html">Каталог</a></li>
                    <li><a href="cart.html">Корзина</a></li>
                    <li><a href="#">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="checkout" id="checkout">
            <h2>Оформление заказа</h2>
            
            <div class="cart-items">
                <!-- Товары из корзины будут добавлены через JavaScript -->
            </div>
            
            <div class="cart-total">
                <strong>Итого: </strong><span id="total-price">0</span> руб
            </div>
            
            <form id="checkout-form" class="checkout-form">
                <h3>Контактная информация</h3>
                <div class="form-group">
                    <label for="name">ФИО:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <h3>Адрес доставки</h3>
                <div class="form-group">
                    <label for="city">Город:</label>
                    <input type="text" id="city" name="city" required>
                </div>
                
                <div class="form-group">
                    <label for="address">Адрес:</label>
                    <input type="text" id="address" name="address" required>
                </div>
                
                <div class="form-group">
                    <label for="postal-code">Почтовый индекс:</label>
                    <input type="text" id="postal-code" name="postal-code" required>
                </div>
                
                <h3>Способ оплаты</h3>
                <div class="form-group">
                    <label>
                        <input type="radio" name="payment-method" value="card" checked>
                        Банковская карта
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="radio" name="payment-method" value="cash">
                        Наличные при получении
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn" onclick="window.history.back()">Назад</button>
                    <button type="submit" class="btn">Оформить заказ</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Интернет магазин. Все права защищены.</p>
        </div>
    </footer>

    <script src="src.js"></script>
</body>
</html>
